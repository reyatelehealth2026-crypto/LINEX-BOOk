name: Configure Vercel Domains

on:
  workflow_dispatch:
    inputs:
      root_domain:
        description: Root domain (default likesms.net)
        required: false
        default: likesms.net
  push:
    branches: [master]
    paths:
      - scripts/vercel-setup-domains.mjs
      - .github/workflows/vercel-domains.yml

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Configure Vercel domains + env
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT: ${{ secrets.VERCEL_PROJECT }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          ROOT_DOMAIN: ${{ inputs.root_domain || 'likesms.net' }}
        run: node scripts/vercel-setup-domains.mjs
